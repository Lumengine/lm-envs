# Unitree Go2 — control + RL prep for the vendored URDF (assets/go2/). Read by lm.rl's
# config-driven prep: floats the base and authors a UsdPhysics PD DriveAPI on the 12
# actuated leg joints. Default stance + gains follow the Genesis go2 example.

floating_base: true

default_joint_angles:                # PD targets / reset stance (radians), by joint NAME
  FL_hip_joint: 0.0
  FR_hip_joint: 0.0
  RL_hip_joint: 0.0
  RR_hip_joint: 0.0
  FL_thigh_joint: 0.8
  FR_thigh_joint: 0.8
  RL_thigh_joint: 1.0
  RR_thigh_joint: 1.0
  FL_calf_joint: -1.5
  FR_calf_joint: -1.5
  RL_calf_joint: -1.5
  RR_calf_joint: -1.5

actuated_joints: ["*_hip_joint", "*_thigh_joint", "*_calf_joint"]   # the 12 leg joints

drive:                               # PD gains: Kp20/Kd0.5 (Genesis) is too weak in our sim to
                                     # generate a stride (Go2 stays planted) — Kp40/Kd1.0 gives the
                                     # authority to step, paired with the gentle "genesis" reward.
  default: { stiffness: 40.0, damping: 1.0, max_force: 23.7, drive_type: force }

# Render polish (the .dae COLLADA materials are dropped by the URDF->USD converter -> meshes
# render black). Author the source diffuse colors as displayColor: light grey body + black
# lower legs/feet (matching the real Go2 / the Genesis render).
display_color: [0.67, 0.69, 0.77]
display_colors:
  "*calf*": [0.02, 0.02, 0.02]
  "*foot*": [0.02, 0.02, 0.02]
