# Unitree Go2 — control + RL prep for the vendored URDF (assets/go2/). Read by lm.rl's
# config-driven prep: floats the base and authors a UsdPhysics PD DriveAPI on the 12
# actuated leg joints. Default stance + gains follow the Genesis go2 example.

floating_base: true

default_joint_angles:                # PD targets / reset stance (radians), by joint NAME
  FL_hip_joint: 0.0
  FR_hip_joint: 0.0
  RL_hip_joint: 0.0
  RR_hip_joint: 0.0
  FL_thigh_joint: 0.8
  FR_thigh_joint: 0.8
  RL_thigh_joint: 1.0
  RR_thigh_joint: 1.0
  FL_calf_joint: -1.5
  FR_calf_joint: -1.5
  RL_calf_joint: -1.5
  RR_calf_joint: -1.5

actuated_joints: ["*_hip_joint", "*_thigh_joint", "*_calf_joint"]   # the 12 leg joints

drive:                               # Unitree Go2 PD gains (Genesis values — stable) + torque limit
  default: { stiffness: 20.0, damping: 0.5, max_force: 23.7, drive_type: force }
