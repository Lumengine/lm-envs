[pytest]
# Tier 0 (tests/tier0) is engine-free and must pass on any machine, GPU or not.
# Engine-bound tests (tests/test_rl_*.py, tests/tier1) follow the one-world-per-
# process contract and are driven by scripts/run_engine_tests.py, NOT by a shared
# pytest session — collecting them here would kill the session on the first
# rl.destroy_world (os._exit). Hence testpaths only lists tier0.
testpaths = tests/tier0
pythonpath = .
markers =
    engine: requires the built Lumengine engine (LUMENGINE_ROOT)
    gpu: requires CUDA at runtime (direct-GPU batch)
    soak: long-running endurance test (nightly only)
