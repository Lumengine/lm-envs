# Tier 0 is engine-free by design (see pytest.ini): registry/config/asset/license
# consistency, config layering. It runs on any hosted runner — no GPU, no engine.
# Tiers 1-3 (engine + CUDA) run on a self-hosted GPU runner via
# scripts/run_engine_tests.py; wire that job in once such a runner exists.
name: tier0

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

jobs:
  tier0:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Tier 0 (engine-free consistency suite)
        run: python -m pytest -q
      - name: fetch_assets --check (informational)
        continue-on-error: true
        run: python scripts/fetch_assets.py --check

  # Packaging gate — build the lumotion-envs wheel and prove a pip user's
  # engine-free surface: entry points exist, package data (configs) ships,
  # `lumotion-train --list` prints the catalog. Engine-dependent paths still
  # need the GPU runner (see header comment).
  wheel:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          pip install -q build
          python -m build --wheel
      - name: Install into a clean venv + smoke the CLI
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/venv"
          VENV_PY="$RUNNER_TEMP/venv/Scripts/python"
          "$VENV_PY" -m pip install -q dist/lumotion_envs-*.whl
          # cd OUT of the repo first: from the repo root, `import lumotion_envs`
          # silently falls back to the checkout and would mask a broken wheel.
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/venv/Scripts/lumotion-train" --list
          "$VENV_PY" - << 'EOF'
          from importlib import resources
          import lumotion_envs
          assert "site-packages" in lumotion_envs.__file__, \
              f"imported from the checkout, not the wheel: {lumotion_envs.__file__}"
          cfgs = [p.name for p in (resources.files(lumotion_envs) / "configs").iterdir()]
          assert any(c.endswith(".yaml") for c in cfgs), f"packaged configs missing: {cfgs}"
          print("packaged configs:", sorted(cfgs))
          EOF
